<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>ChatApp - Room Based</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0084ff;
            --dark-bg: #0a0e27;
            --dark-card: #1a1f3a;
            --dark-border: #2d3548;
            --text-primary: #fff;
            --text-secondary: #999;
            --accent: #ff6b00;
            --danger: #ff3b30;
        }
        body[data-theme="light"] {
            --primary: #0084ff;
            --dark-bg: #f4f5f7;
            --dark-card: #ffffff;
            --dark-border: #e1e4e8;
            --text-primary: #1a1f3a;
            --text-secondary: #666;
        }
        body {
            font-family: -apple-system, sans-serif; background: var(--dark-bg);
            color: var(--text-primary); overflow: hidden; transition: background 0.2s, color 0.2s;
        }
        .container { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 340px; border-right: 1px solid var(--dark-border); display: flex; flex-direction: column; background: var(--dark-card); height: 100%; }
        .main { flex: 1; display: flex; flex-direction: column; background: var(--dark-bg); }

        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--dark-border); display: flex; flex-direction: column; gap: 10px; }
        .profile-section { display: flex; align-items: center; gap: 12px; }
        .avatar-wrap { position: relative; width: 50px; height: 50px; }
        .avatar-preview { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #555; border: 2px solid var(--primary); }
        .avatar-label { position: absolute; bottom: -2px; right: -2px; background: var(--primary); font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .name-input { background: transparent; border: none; border-bottom: 1px dashed var(--text-secondary); color: var(--text-primary); font-size: 16px; font-weight: bold; width: 100%; outline: none; padding: 2px 0; }
        .name-input:focus { border-bottom-style: solid; border-bottom-color: var(--primary); }
        .settings-gear { background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
        .settings-gear:hover { background: var(--dark-border); }

        .config-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #34c759; }
        input:checked + .slider:before { transform: translateX(14px); }

        .action-buttons { padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid var(--dark-border); }
        .action-buttons button, .modal-buttons button, .room-actions button { flex: 1; min-width: 90px; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .action-buttons button.secondary { background: var(--dark-border); color: var(--text-primary); }
        .action-buttons button.danger { background: var(--danger); }

        .rooms-list { flex: 1; overflow-y: auto; }
        .room-item { padding: 12px 16px; border-bottom: 1px solid var(--dark-border); cursor: pointer; }
        .room-item.active { background: var(--primary); color: white; }

        .chat-header { padding: 14px 20px; border-bottom: 1px solid var(--dark-border); display: flex; justify-content: space-between; align-items: center; }
        .room-actions { display: flex; gap: 8px; align-items: center; }

        .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message { display: flex; }
        .message.sent { justify-content: flex-end; }
        .message.received { justify-content: flex-start; }
        .message-content { max-width: 70%; display: flex; flex-direction: column; }
        .message-bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; word-break: break-word; }
        .message.sent .message-bubble { background: var(--primary); color: white; }
        .message.received .message-bubble { background: var(--dark-border); color: var(--text-primary); }
        .message-user { font-size: 11px; color: var(--accent); margin-bottom: 4px; font-weight: bold; }

        .input-section { padding: 12px 16px; border-top: 1px solid var(--dark-border); display: flex; gap: 8px; align-items: center; }
        .input-section input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid var(--dark-border); background: var(--dark-bg); color: var(--text-primary); outline: none; }
        .input-section button { padding: 10px 16px; background: var(--primary); color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; opacity: 0; transition: 0.3s; z-index: 2000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.show { display: flex; }
        .modal-content { background: var(--dark-card); padding: 24px; border-radius: 12px; width: 90%; max-width: 400px; }
        .modal-content input { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 8px; border: 1px solid var(--dark-border); background: var(--dark-bg); color: var(--text-primary); outline: none; }
        .modal-content h2 { margin-bottom: 16px; }
        .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--dark-border); }
        .settings-row:last-of-type { border-bottom: none; }
        .settings-row span { font-size: 14px; }
        .close-settings { margin-top: 16px; width: 100%; padding: 10px; background: var(--dark-border); color: var(--text-primary); border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="setupModal" class="modal"></div>
    <div id="roomModal" class="modal"></div>
    <div id="settingsModal" class="modal"></div>
    <div id="toast" class="toast">Saved in real-time</div>

    <script>
        const API = window.location.origin + '/api';
        window.app = { user: null, currentRoom: null, rooms: [], windowFocused: true };

        window.addEventListener('focus', () => app.windowFocused = true);
        window.addEventListener('blur', () => app.windowFocused = false);

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str ?? '';
            return div.innerHTML;
        }

        async function api(endpoint, method = 'GET', body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(API + endpoint, opts);
            return res.json();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 720;
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
                osc.start(); osc.stop(ctx.currentTime + 0.25);
            } catch (e) { }
        }

        function applyTheme(theme) {
            document.body.dataset.theme = theme === 'light' ? 'light' : 'dark';
        }

        function defaultSettings() {
            return { theme: 'dark', notifications: true, soundEnabled: true };
        }

        function init() {
            const saved = localStorage.getItem('user');
            if (saved) {
                app.user = JSON.parse(saved);
                if (!app.user.settings) app.user.settings = defaultSettings();
                applyTheme(app.user.settings.theme);
                renderMain(); sync();
            } else {
                renderSetup();
            }
        }

        function renderSetup() {
            const m = document.getElementById('setupModal');
            m.innerHTML = `
                <div class="modal-content">
                    <h2>Welcome to ChatApp</h2>
                    <input type="text" id="name" placeholder="Full Name" maxlength="50">
                    <input type="email" id="email" placeholder="Email" maxlength="254">
                    <div class="modal-buttons"><button onclick="saveUser()">Continue</button></div>
                </div>`;
            m.classList.add('show');
        }

        async function saveUser() {
            const data = { name: document.getElementById('name').value.trim(), email: document.getElementById('email').value.trim(), avatar: '', isPrivate: false };
            if (!data.name || !data.email) return alert('Name and Email required');
            const res = await api('/init-user', 'POST', data);
            if (res.error) return alert(res.error);
            app.user = res.user;
            if (!app.user.settings) app.user.settings = defaultSettings();
            applyTheme(app.user.settings.theme);
            localStorage.setItem('user', JSON.stringify(app.user));
            document.getElementById('setupModal').classList.remove('show');
            renderMain(); sync();
            if ('Notification' in window) Notification.requestPermission();
        }

        function renderMain() {
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="sidebar">
                        <div class="sidebar-header">
                            <div class="profile-section">
                                <div class="avatar-wrap">
                                    <img id="avatarPreview" class="avatar-preview" src="${escapeHtml(app.user.avatar || 'https://via.placeholder.com/150')}" />
                                    <label for="avatarInput" class="avatar-label">📷</label>
                                    <input type="file" id="avatarInput" style="display:none" accept="image/*" onchange="updateProfileAvatar(this)">
                                </div>
                                <div style="flex:1;">
                                    <input type="text" class="name-input" id="userNameInput" value="${escapeHtml(app.user.name)}" maxlength="50" onblur="updateProfileName(this.value)">
                                </div>
                                <button class="settings-gear" title="Settings" onclick="showSettingsModal()">⚙️</button>
                            </div>
                            <div class="config-row">
                                <span>Private Profile</span>
                                <label class="switch">
                                    <input type="checkbox" id="privacyToggle" ${app.user.isPrivate ? 'checked' : ''} onchange="updatePrivacy(this.checked)">
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button onclick="showRoomModal('create')">Create Room</button>
                            <button class="secondary" onclick="showRoomModal('join')">Join Room</button>
                            <button class="secondary" onclick="submitReport()">Report Issue</button>
                        </div>
                        <div class="rooms-list" id="roomsList"></div>
                    </div>
                    <div class="main" id="mainArea">
                        <div style="padding:40px;text-align:center;color:var(--text-secondary);">Select a room to chat</div>
                    </div>
                </div>`;
            updateRooms();
        }

        function showSettingsModal() {
            const s = app.user.settings || defaultSettings();
            const m = document.getElementById('settingsModal');
            m.innerHTML = `
                <div class="modal-content">
                    <h2>Settings</h2>
                    <div class="settings-row">
                        <span>Light Theme</span>
                        <label class="switch">
                            <input type="checkbox" id="themeToggle" ${s.theme === 'light' ? 'checked' : ''} onchange="updateSetting('theme', this.checked ? 'light' : 'dark')">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="settings-row">
                        <span>Notifications</span>
                        <label class="switch">
                            <input type="checkbox" id="notifToggle" ${s.notifications ? 'checked' : ''} onchange="updateSetting('notifications', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="settings-row">
                        <span>Message Sound</span>
                        <label class="switch">
                            <input type="checkbox" id="soundToggle" ${s.soundEnabled ? 'checked' : ''} onchange="updateSetting('soundEnabled', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <button class="close-settings" onclick="document.getElementById('settingsModal').classList.remove('show')">Close</button>
                </div>`;
            m.classList.add('show');
        }

        async function updateSetting(key, value) {
            app.user.settings = app.user.settings || defaultSettings();
            app.user.settings[key] = value;
            localStorage.setItem('user', JSON.stringify(app.user));

            if (key === 'theme') applyTheme(value);
            if (key === 'notifications' && value && 'Notification' in window) Notification.requestPermission();

            const res = await api('/update-settings', 'POST', { email: app.user.email, settings: app.user.settings });
            if (res.success) showToast('Settings saved!');
        }

        async function updateProfileName(newName) {
            newName = newName.trim();
            if (!newName || newName === app.user.name) return;
            app.user.name = newName;
            const res = await api('/update-profile', 'POST', { email: app.user.email, name: newName, isPrivate: app.user.isPrivate, avatar: app.user.avatar });
            if (res.error) return showToast(res.error);
            localStorage.setItem('user', JSON.stringify(app.user));
            showToast("Name saved in real-time!");
        }

        async function updateProfileAvatar(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            if (file.size > 2 * 1024 * 1024) {
                alert('Please choose an image under 2MB.');
                input.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = async function (e) {
                document.getElementById('avatarPreview').src = e.target.result;
                app.user.avatar = e.target.result;
                const res = await api('/update-profile', 'POST', { email: app.user.email, name: app.user.name, isPrivate: app.user.isPrivate, avatar: e.target.result });
                if (res.error) return showToast(res.error);
                localStorage.setItem('user', JSON.stringify(app.user));
                showToast("Avatar saved instantly!");
            };
            reader.readAsDataURL(file);
        }

        async function updatePrivacy(checked) {
            app.user.isPrivate = checked;
            const res = await api('/update-profile', 'POST', { email: app.user.email, name: app.user.name, isPrivate: checked, avatar: app.user.avatar });
            if (res.error) return showToast(res.error);
            localStorage.setItem('user', JSON.stringify(app.user));
            showToast(checked ? "Profile is now Private" : "Profile is Public");
        }

        async function submitReport() {
            const reason = prompt("Describe the bug or report the offensive user context:");
            if (!reason) return;
            const res = await api('/submit-report', 'POST', { sender: app.user.email, details: reason.slice(0, 1000) });
            if (res.error) return alert(res.error);
            alert("Report cataloged directly to internal operations.");
        }

        async function updateRooms() {
            const res = await api('/rooms/' + encodeURIComponent(app.user.email));
            app.rooms = res.rooms || [];
            document.getElementById('roomsList').innerHTML = app.rooms.map(r => `
                <div class="room-item ${app.currentRoom?._id === r._id ? 'active' : ''}" onclick="selectRoom('${r._id}')">
                    <strong>🔒 ${escapeHtml(r.roomName)}</strong> <br>
                    <small>${r.members.length} members ${r.allowInvites ? '(Open)' : '(Locked)'}</small>
                </div>
            `).join('');
        }

        async function selectRoom(id) {
            app.currentRoom = app.rooms.find(r => r._id === id);
            const isCreator = app.currentRoom.creator === app.user.email;

            document.getElementById('mainArea').innerHTML = `
                <div class="chat-header">
                    <div>
                        <h3>${escapeHtml(app.currentRoom.roomName)}</h3>
                        <small style="color:var(--text-secondary)">ID: ${escapeHtml(app.currentRoom.roomId)}</small>
                    </div>
                    <div class="room-actions">
                        <div style="font-size:12px; color:var(--text-secondary); display:flex; gap:6px; align-items:center;">
                            <span>Invites</span>
                            <label class="switch">
                                <input type="checkbox" id="inviteToggle" ${app.currentRoom.allowInvites ? 'checked' : ''} ${!isCreator ? 'disabled' : ''} onchange="toggleRoomInvites(this.checked)">
                                <span class="slider"></span>
                            </label>
                        </div>
                        ${isCreator ? `<button class="danger" onclick="deleteRoomPermanently('${app.currentRoom._id}')">Delete Group</button>` : ''}
                    </div>
                </div>
                <div class="messages-area" id="msgs"></div>
                <div class="input-section">
                    <input type="text" id="msgInput" placeholder="Type message..." maxlength="2000">
                    <button onclick="sendMsg()">Send</button>
                </div>`;
            app.lastMsgCount = 0;
            updateMsgs();
        }

        async function toggleRoomInvites(checked) {
            const res = await api('/room-allow-invites', 'POST', { roomId: app.currentRoom._id, allowInvites: checked });
            if (res.error) return showToast(res.error);
            showToast("Group rules saved!");
        }

        async function deleteRoomPermanently(dbId) {
            if (!confirm("Are you absolutely certain you want to destroy this group? All history records disappear.")) return;
            const res = await api('/delete-room', 'POST', { id: dbId, email: app.user.email });
            if (res.success) {
                app.currentRoom = null;
                renderMain();
                showToast("Group completely deleted.");
            } else if (res.error) {
                showToast(res.error);
            }
        }

        async function updateMsgs() {
            if (!app.currentRoom) return;
            const res = await api('/messages/' + app.currentRoom._id);
            const msgs = res.messages || [];
            const box = document.getElementById('msgs');
            if (!box) return;

            if (app.lastMsgCount !== undefined && msgs.length > app.lastMsgCount) {
                const newest = msgs[msgs.length - 1];
                const isMe = newest.sender === app.user.email;
                const settings = app.user.settings || defaultSettings();
                if (!isMe) {
                    if (settings.soundEnabled) playBeep();
                    if (settings.notifications && !app.windowFocused && 'Notification' in window && Notification.permission === 'granted') {
                        new Notification(newest.senderName || 'New message', { body: newest.text.slice(0, 100) });
                    }
                }
            }
            app.lastMsgCount = msgs.length;

            box.innerHTML = msgs.map(m => {
                const isMe = m.sender === app.user.email;
                return `<div class="message ${isMe ? 'sent' : 'received'}">
                    <div class="message-content">
                        ${!isMe ? `<div class="message-user">${escapeHtml(m.senderName)}</div>` : ''}
                        <div class="message-bubble">${escapeHtml(m.text)}</div>
                    </div>
                </div>`;
            }).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;
            const res = await api('/send-message', 'POST', { roomId: app.currentRoom._id, sender: app.user.email, senderName: app.user.name, text });
            if (res.error) return showToast(res.error);
            input.value = ''; updateMsgs();
        }

        function showRoomModal(type) {
            const m = document.getElementById('roomModal');
            const isCreate = type === 'create';
            m.innerHTML = `
                <div class="modal-content">
                    <h2>${isCreate ? 'Create' : 'Join'} Room</h2>
                    <input type="text" id="roomInput" placeholder="${isCreate ? 'Room Name' : 'Room ID'}" maxlength="50">
                    <div class="modal-buttons">
                        <button onclick="${isCreate ? 'createRoom()' : 'joinRoom()'}">${isCreate ? 'Create' : 'Join'}</button>
                        <button class="secondary" onclick="document.getElementById('roomModal').classList.remove('show')">Cancel</button>
                    </div>
                </div>`;
            m.classList.add('show');
        }

        async function createRoom() {
            const name = document.getElementById('roomInput').value.trim();
            if (!name) return;
            const res = await api('/create-room', 'POST', { creator: app.user.email, roomName: name });
            if (res.error) return alert(res.error);
            alert('Share Room ID to let friends join: ' + res.roomId);
            document.getElementById('roomModal').classList.remove('show');
            updateRooms();
        }

        async function joinRoom() {
            const id = document.getElementById('roomInput').value.trim();
            if (!id) return;
            const res = await api('/join-room', 'POST', { email: app.user.email, roomId: id });
            if (res.error) alert(res.error);
            document.getElementById('roomModal').classList.remove('show');
            updateRooms();
        }

        function sync() { setInterval(() => { app.currentRoom ? updateMsgs() : updateRooms(); }, 2000); }
        init();
    </script>
</body>
</html>
