<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp - Modern Room Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        :root {
            --bg-main: #0b141a;
            --bg-sidebar: #111b21;
            --bg-header: #202c33;
            --bg-card: #111b21;
            --border-color: #222e35;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --accent-green: #00a884;
            --bubble-sent: #005c4b;
            --bubble-received: #202c33;
            --input-bg: #2a3942;
            --btn-hover: #182229;
        }

        body.light-mode {
            --bg-main: #efeae2;
            --bg-sidebar: #ffffff;
            --bg-header: #f0f2f5;
            --bg-card: #ffffff;
            --border-color: #e9edef;
            --text-primary: #111b21;
            --text-secondary: #667781;
            --accent-green: #008069;
            --bubble-sent: #d9fdd3;
            --bubble-received: #ffffff;
            --input-bg: #ffffff;
            --btn-hover: #f0f2f5;
        }

        body { 
            background: var(--bg-main);
            color: var(--text-primary); 
            overflow: hidden; 
            transition: background 0.3s;
            height: 100vh;
            width: 100vw;
        }

        .container { display: flex; height: 100vh; width: 100vw; }
        
        /* Sidebar Styling */
        .sidebar { 
            width: 400px; 
            border-right: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            background: var(--bg-sidebar); 
            height: 100%; 
        }
        
        .sidebar-header { 
            padding: 12px 16px; 
            background: var(--bg-header); 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-top h2 { font-size: 20px; font-weight: 700; color: var(--text-primary); }

        .user-info { 
            font-size: 13px; 
            color: var(--text-secondary); 
            padding: 8px 12px; 
            background: var(--bg-main); 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .settings-btn { 
            background: none; 
            border: none; 
            color: var(--accent-green); 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 600; 
        }
        
        .action-buttons { 
            padding: 10px 16px; 
            display: flex; 
            gap: 10px; 
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
        }
        
        .action-buttons button, .modal-buttons button { 
            flex: 1; 
            padding: 10px; 
            background: var(--accent-green); 
            color: white; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 14px;
            transition: background 0.2s;
        }
        .action-buttons button:hover, .modal-buttons button:hover { opacity: 0.9; }
        .action-buttons button.secondary, .modal-buttons button.secondary { background: var(--bg-header); color: var(--text-primary); border: 1px solid var(--border-color); }
        .action-buttons button.secondary:hover, .modal-buttons button.secondary:hover { background: var(--btn-hover); }

        /* Rooms List Layout */
        .rooms-list { flex: 1; overflow-y: auto; background: var(--bg-sidebar); }
        .room-item { 
            padding: 15px 20px; 
            border-bottom: 1px solid var(--border-color); 
            cursor: pointer; 
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: background 0.2s;
        }
        .room-item:hover { background: var(--bg-header); }
        .room-item.active { background: var(--bg-header); border-left: 4px solid var(--accent-green); }
        .room-item strong { font-size: 16px; color: var(--text-primary); }
        .room-item small { font-size: 13px; color: var(--text-secondary); }

        /* Main Window Layout */
        .main { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); position: relative; }
        
        .chat-header { 
            padding: 14px 20px; 
            background: var(--bg-header); 
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            height: 60px;
        }
        .chat-header h3 { font-size: 16px; font-weight: 600; color: var(--text-primary); }

        /* WhatsApp Wallpaper Backdrop effect */
        .messages-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 24px 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        
        /* Message Bubbles Structure */
        .message { display: flex; width: 100%; }
        .message.sent { justify-content: flex-end; }
        .message.received { justify-content: flex-start; }
        
        .message-content {
            max-width: 65%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .message-bubble { 
            padding: 8px 14px; 
            border-radius: 8px; 
            font-size: 14.5px; 
            line-height: 1.4;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
            word-break: break-word;
        }
        .message.sent .message-bubble { background: var(--bubble-sent); color: var(--text-primary); border-top-right-radius: 0; }
        .message.received .message-bubble { background: var(--bubble-received); color: var(--text-primary); border-top-left-radius: 0; }
        
        .message-user { font-size: 12px; color: #53bdeb; margin-bottom: 3px; font-weight: 600; }
        body.light-mode .message-user { color: #007ea7; }

        /* Dynamic Input Section Bar */
        .input-section { 
            padding: 10px 24px; 
            background: var(--bg-header); 
            display: flex; 
            align-items: center;
            gap: 12px; 
            height: 62px;
        }
        .input-section input { 
            flex: 1; 
            padding: 12px 20px; 
            border-radius: 8px; 
            border: none; 
            background: var(--input-bg); 
            color: var(--text-primary); 
            outline: none; 
            font-size: 15px;
        }
        .input-section button { 
            padding: 12px 24px; 
            background: var(--accent-green); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 14px;
        }

        /* Clean Pop-Up Modals styling */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11,20,26,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal.show { display: flex; }
        .modal-content { background: var(--bg-header); padding: 30px; border-radius: 16px; width: 90%; max-width: 420px; border: 1px solid var(--border-color); box-shadow: 0 24px 64px rgba(0,0,0,0.24); }
        .modal-content h2 { font-size: 20px; margin-bottom: 20px; color: var(--text-primary); }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-primary); outline: none; font-size: 15px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 10px; }
        
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; color: var(--text-primary); font-size: 15px; }
        .setting-row select { width: auto; margin-bottom: 0; padding: 6px 12px; }
        .setting-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent-green); cursor: pointer; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            gap: 12px;
            text-align: center;
        }
        .empty-state h3 { font-size: 32px; font-weight: 300; color: var(--text-primary); }
        .empty-state p { font-size: 14px; max-width: 360px; line-height: 1.4; }

        @media (max-width: 768px) { .sidebar { width: 100%; } .main { display: none; } }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="setupModal" class="modal"></div>
    <div id="roomModal" class="modal"></div>
    <div id="settingsModal" class="modal"></div>
    
    <script>
        const API = window.location.origin + '/api';
        window.app = { user: null, currentRoom: null, rooms: [], isDarkMode: true };
        
        async function api(endpoint, method = 'GET', body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            return (await fetch(API + endpoint, opts)).json();
        }

        function init() {
            const saved = localStorage.getItem('user');
            if (saved) { 
                app.user = JSON.parse(saved); 
                applyTheme(app.user.settings?.theme || 'dark');
                renderMain(); 
                sync(); 
            } 
            else renderSetup();
        }

        function renderSetup() {
            const m = document.getElementById('setupModal');
            m.innerHTML = `
                <div class="modal-content">
                    <h2>Create Profile</h2>
                    <input type="text" id="name" placeholder="Full Name">
                    <input type="email" id="email" placeholder="Email Address">
                    <input type="tel" id="phone" placeholder="Phone Number">
                    <div class="modal-buttons"><button onclick="saveUser()">Get Started</button></div>
                </div>`;
            m.classList.add('show');
        }

        async function saveUser() {
            const data = { name: document.getElementById('name').value, email: document.getElementById('email').value, phone: document.getElementById('phone').value };
            if (!data.name || !data.email) return alert('Name and Email required');
            const res = await api('/init-user', 'POST', data);
            app.user = res.user;
            localStorage.setItem('user', JSON.stringify(app.user));
            applyTheme(app.user.settings?.theme || 'dark');
            document.getElementById('setupModal').classList.remove('show');
            renderMain(); sync();
        }

        function renderMain() {
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="sidebar">
                        <div class="sidebar-header">
                            <div class="header-top">
                                <h2>Chats</h2>
                                <button class="settings-btn" onclick="showSettingsModal()">⚙️ Settings</button>
                            </div>
                            <div class="user-info">
                                <span>Logged in as: <strong>${app.user.name}</strong></span>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button onclick="showRoomModal('create')">New Room</button>
                            <button class="secondary" onclick="showRoomModal('join')">Join with ID</button>
                        </div>
                        <div class="rooms-list" id="roomsList"></div>
                    </div>
                    <div class="main" id="mainArea">
                        <div class="empty-state">
                            <h3>ChatApp Web</h3>
                            <p>Select an existing chat room configuration from the sidebar loop or spin up a new private channel to start broadcast messaging.</p>
                        </div>
                    </div>
                </div>`;
            updateRooms();
        }

        function showSettingsModal() {
            const m = document.getElementById('settingsModal');
            const currentSettings = app.user.settings || { theme: 'dark', notifications: true, soundEnabled: true };
            m.innerHTML = `
                <div class="modal-content">
                    <h2>Settings</h2>
                    <div class="setting-row">
                        <label>Theme</label>
                        <select id="settingTheme">
                            <option value="dark" ${currentSettings.theme === 'dark' ? 'selected' : ''}>Dark</option>
                            <option value="light" ${currentSettings.theme === 'light' ? 'selected' : ''}>Light</option>
                        </select>
                    </div>
                    <div class="setting-row">
                        <label>Notifications</label>
                        <input type="checkbox" id="settingNotify" ${currentSettings.notifications ? 'checked' : ''}>
                    </div>
                    <div class="setting-row">
                        <label>Sound Effects</label>
                        <input type="checkbox" id="settingSound" ${currentSettings.soundEnabled ? 'checked' : ''}>
                    </div>
                    <div class="modal-buttons">
                        <button onclick="saveSettings()">Save</button>
                        <button class="secondary" onclick="document.getElementById('settingsModal').classList.remove('show')">Cancel</button>
                    </div>
                </div>`;
            m.classList.add('show');
        }

        async function saveSettings() {
            const selectedTheme = document.getElementById('settingTheme').value;
            const updatedSettings = {
                theme: selectedTheme,
                notifications: document.getElementById('settingNotify').checked,
                soundEnabled: document.getElementById('settingSound').checked
            };

            const res = await api('/update-settings', 'POST', {
                email: app.user.email,
                settings: updatedSettings
            });

            if (res.success) {
                app.user.settings = res.settings;
                localStorage.setItem('user', JSON.stringify(app.user));
                applyTheme(res.settings.theme);
                document.getElementById('settingsModal').classList.remove('show');
                renderMain();
            }
        }

        function applyTheme(theme) {
            if (theme === 'light') document.body.classList.add('light-mode');
            else document.body.classList.remove('light-mode');
        }

        async function updateRooms() {
            const res = await api('/rooms/' + app.user.email);
            app.rooms = res.rooms || [];
            document.getElementById('roomsList').innerHTML = app.rooms.map(r => `
                <div class="room-item ${app.currentRoom?._id === r._id ? 'active' : ''}" onclick="selectRoom('${r._id}')">
                    <strong>💬 ${r.roomName}</strong>
                    <small>${r.members.length} participants</small>
                </div>
            `).join('');
        }

        async function selectRoom(id) {
            app.currentRoom = app.rooms.find(r => r._id === id);
            document.getElementById('mainArea').innerHTML = `
                <div class="chat-header">
                    <h3>${app.currentRoom.roomName}</h3>
                </div>
                <div class="messages-area" id="msgs"></div>
                <div class="input-section">
                    <input type="text" id="msgInput" placeholder="Type a message">
                    <button onclick="sendMsg()">Send</button>
                </div>`;
            
            // Allow pressing Enter key to send message smoothly
            document.getElementById('msgInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendMsg();
            });
            updateMsgs();
        }

        async function updateMsgs() {
            if (!app.currentRoom) return;
            const res = await api('/messages/' + app.currentRoom._id);
            const msgs = res.messages || [];
            const box = document.getElementById('msgs');
            box.innerHTML = msgs.map(m => {
                const isMe = m.sender === app.user.email;
                return `<div class="message ${isMe ? 'sent' : 'received'}">
                    <div class="message-content">
                        ${!isMe ? `<div class="message-user">${m.senderName}</div>` : ''}
                        <div class="message-bubble">${m.text}</div>
                    </div>
                </div>`;
            }).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;
            await api('/send-message', 'POST', { roomId: app.currentRoom._id, sender: app.user.email, senderName: app.user.name, text: input.value });
            input.value = ''; updateMsgs();
        }

        function showRoomModal(type) {
            const m = document.getElementById('roomModal');
            const isCreate = type === 'create';
            m.innerHTML = `
                <div class="modal-content">
                    <h2>${isCreate ? 'Create New Room' : 'Join Existing Room'}</h2>
                    <input type="text" id="roomInput" placeholder="${isCreate ? 'Enter Room Name' : 'Paste Room ID'}">
                    <div class="modal-buttons">
                        <button onclick="${isCreate ? 'createRoom()' : 'joinRoom()'}">${isCreate ? 'Create' : 'Join'}</button>
                        <button class="secondary" onclick="document.getElementById('roomModal').classList.remove('show')">Cancel</button>
                    </div>
                </div>`;
            m.classList.add('show');
        }

        async function createRoom() {
            const name = document.getElementById('roomInput').value;
            if(!name.trim()) return;
            const res = await api('/create-room', 'POST', { creator: app.user.email, roomName: name });
            alert('Room Generated Successfully!\nShare this ID with friends: ' + res.roomId);
            document.getElementById('roomModal').classList.remove('show');
            updateRooms();
        }

        async function joinRoom() {
            const id = document.getElementById('roomInput').value;
            if(!id.trim()) return;
            await api('/join-room', 'POST', { email: app.user.email, roomId: id });
            document.getElementById('roomModal').classList.remove('show');
            updateRooms();
        }

        function sync() { setInterval(() => { app.currentRoom ? updateMsgs() : updateRooms(); }, 2000); }
        init();
    </script>
</body>
</html>
