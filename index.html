<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp - Modern Room Chat</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        :root {
            --bg-main: #0b141a;
            --bg-sidebar: #111b21;
            --bg-header: #202c33;
            --bg-card: #111b21;
            --border-color: #222e35;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --accent-green: #00a884;
            --bubble-sent: #005c4b;
            --bubble-received: #202c33;
            --input-bg: #2a3942;
            --btn-hover: #182229;
            --wa-bg-dark: #0b141a;
            --wa-surface: #111b21;
            --wa-divider: #222e35;
        }

        body.light-mode {
            --bg-main: #efeae2;
            --bg-sidebar: #ffffff;
            --bg-header: #f0f2f5;
            --bg-card: #ffffff;
            --border-color: #e9edef;
            --text-primary: #111b21;
            --text-secondary: #667781;
            --accent-green: #008069;
            --bubble-sent: #d9fdd3;
            --bubble-received: #ffffff;
            --input-bg: #ffffff;
            --btn-hover: #f0f2f5;
            --wa-bg-dark: #f0f2f5;
            --wa-surface: #ffffff;
            --wa-divider: #e9edef;
        }

        body { 
            background: var(--bg-main);
            color: var(--text-primary); 
            overflow: hidden; 
            transition: background 0.3s;
            height: 100vh;
            width: 100vw;
        }

        .container { display: flex; height: 100vh; width: 100vw; }
        
        /* Sidebar Styling */
        .sidebar { 
            width: 400px; 
            border-right: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            background: var(--bg-sidebar); 
            height: 100%; 
        }
        
        .sidebar-header { 
            padding: 12px 16px; 
            background: var(--bg-header); 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-top h2 { font-size: 20px; font-weight: 700; color: var(--text-primary); }

        .user-info { 
            font-size: 13px; 
            color: var(--text-secondary); 
            padding: 8px 12px; 
            background: var(--bg-main); 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 10px;
        }

        .user-info-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-info img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .settings-btn { 
            background: none; 
            border: none; 
            color: var(--accent-green); 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 600; 
        }
        
        .action-buttons { 
            padding: 10px 16px; 
            display: flex; 
            gap: 10px; 
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
        }
        
        .action-buttons button, .modal-buttons button { 
            flex: 1; 
            padding: 10px; 
            background: var(--accent-green); 
            color: white; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 14px;
            transition: background 0.2s;
        }
        .action-buttons button:hover, .modal-buttons button:hover { opacity: 0.9; }
        .action-buttons button.secondary, .modal-buttons button.secondary { background: var(--bg-header); color: var(--text-primary); border: 1px solid var(--border-color); }
        .action-buttons button.secondary:hover, .modal-buttons button.secondary:hover { background: var(--btn-hover); }

        /* Rooms List Layout */
        .rooms-list { flex: 1; overflow-y: auto; background: var(--bg-sidebar); }
        .room-item { 
            padding: 15px 20px; 
            border-bottom: 1px solid var(--border-color); 
            cursor: pointer; 
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: background 0.2s;
        }
        .room-item:hover { background: var(--bg-header); }
        .room-item.active { background: var(--bg-header); border-left: 4px solid var(--accent-green); }
        .room-item strong { font-size: 16px; color: var(--text-primary); }
        .room-item small { font-size: 13px; color: var(--text-secondary); }

        /* Main Window Layout */
        .main { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); position: relative; }
        
        .chat-header { 
            padding: 14px 20px; 
            background: var(--bg-header); 
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            height: 60px;
        }
        .chat-header h3 { font-size: 16px; font-weight: 600; color: var(--text-primary); }

        .messages-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 24px 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        
        .message { display: flex; width: 100%; }
        .message.sent { justify-content: flex-end; }
        .message.received { justify-content: flex-start; }
        
        .message-content {
            max-width: 65%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .message-bubble { 
            padding: 8px 14px; 
            border-radius: 8px; 
            font-size: 14.5px; 
            line-height: 1.4;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
            word-break: break-word;
        }
        .message.sent .message-bubble { background: var(--bubble-sent); color: var(--text-primary); border-top-right-radius: 0; }
        .message.received .message-bubble { background: var(--bubble-received); color: var(--text-primary); border-top-left-radius: 0; }
        
        .message-user { font-size: 12px; color: #53bdeb; margin-bottom: 3px; font-weight: 600; }
        body.light-mode .message-user { color: #007ea7; }

        /* Dynamic Input Section Bar */
        .input-section { 
            padding: 10px 24px; 
            background: var(--bg-header); 
            display: flex; 
            align-items: center;
            gap: 12px; 
            height: 62px;
        }
        .input-section input { 
            flex: 1; 
            padding: 12px 20px; 
            border-radius: 8px; 
            border: none; 
            background: var(--input-bg); 
            color: var(--text-primary); 
            outline: none; 
            font-size: 15px;
        }
        .input-section button { 
            padding: 12px 24px; 
            background: var(--accent-green); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 14px;
        }

        /* Clean Pop-Up Modals styling */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11,20,26,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal.show { display: flex; }
        .modal-content { background: var(--bg-header); padding: 30px; border-radius: 16px; width: 90%; max-width: 420px; border: 1px solid var(--border-color); box-shadow: 0 24px 64px rgba(0,0,0,0.24); }
        .modal-content h2 { font-size: 20px; margin-bottom: 20px; color: var(--text-primary); }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-primary); outline: none; font-size: 15px; }
        
        /* WhatsApp Settings Drawer Overrides */
        .settings-drawer {
            background-color: var(--wa-bg-dark);
            color: var(--text-primary);
            width: 100%;
            max-width: 420px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 24px rgba(0,0,0,0.3);
        }

        .settings-header {
            display: flex;
            align-items: center;
            padding: 16px;
            background-color: var(--bg-header);
            gap: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .profile-hero-card {
            display: flex;
            align-items: center;
            padding: 20px 16px;
            cursor: pointer;
            background-color: var(--wa-bg-dark);
            transition: background 0.2s;
        }

        .profile-hero-card:hover {
            background-color: var(--bg-header);
        }

        .avatar-wrapper {
            position: relative;
            margin-right: 15px;
        }

        .avatar-wrapper img {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        .camera-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background-color: var(--accent-green);
            padding: 5px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-hero-info {
            flex-grow: 1;
        }

        .profile-hero-info h3 {
            margin: 0 0 4px 0;
            font-size: 18px;
            font-weight: 500;
        }

        .profile-hero-info p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 14px;
            word-break: break-all;
        }

        .icon-green {
            color: var(--accent-green);
        }

        .settings-divider {
            border: 0;
            height: 1px;
            background-color: var(--wa-divider);
            margin: 0;
        }

        .settings-options-list {
            flex: 1;
            overflow-y: auto;
            padding-top: 10px;
        }

        .settings-row {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            cursor: pointer;
            gap: 25px;
            transition: background 0.2s;
        }

        .settings-row:hover {
            background-color: var(--bg-header);
        }

        .row-icon svg {
            fill: var(--text-secondary);
        }

        .settings-row:hover .row-icon svg {
            fill: var(--accent-green);
        }

        .row-text {
            flex: 1;
        }

        .row-text h4 {
            margin: 0 0 2px 0;
            font-size: 16px;
            font-weight: 400;
        }

        .row-text p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .theme-select-wrapper {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-header);
            margin: 10px 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .theme-select-wrapper select {
            padding: 6px 12px;
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            outline: none;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            gap: 12px;
            text-align: center;
        }
        .empty-state h3 { font-size: 32px; font-weight: 300; color: var(--text-primary); }
        .empty-state p { font-size: 14px; max-width: 360px; line-height: 1.4; }

        @media (max-width: 768px) { .sidebar { width: 100%; } .main { display: none; } }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="setupModal" class="modal"></div>
    <div id="roomModal" class="modal"></div>
    <div id="settingsModal" class="modal"></div>
    
    <script>
        const API = window.location.origin + '/api';
        window.app = { user: null, currentRoom: null, rooms: [], isDarkMode: true };
        
        async function api(endpoint, method = 'GET', body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            return (await fetch(API + endpoint, opts)).json();
        }

        function init() {
            const saved = localStorage.getItem('user');
            if (saved) { 
                app.user = JSON.parse(saved); 
                applyTheme(app.user.settings?.theme || 'dark');
                renderMain(); 
                sync(); 
            } 
            else renderSetup();
        }

        function renderSetup() {
            const m = document.getElementById('setupModal');
            m.innerHTML = `
                <div class="modal-content" style="text-align: center;">
                    <h2>Welcome to ChatApp</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 25px; font-size: 14px;">
                        Please authenticate with your Google account to access your rooms and conversations securely.
                    </p>
                    
                    <div style="display: flex; justify-content: center; margin-top: 15px;">
                        <div id="g_id_onload"
                             data-client_id="157699985261-179mbdt1jlpv4qm85vtkrmkg37mdiie3.apps.googleusercontent.com"
                             data-callback="handleCredentialResponse"
                             data-auto_prompt="false">
                        </div>
                        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_blue" data-text="signin_with" data-shape="rectangular"></div>
                    </div>
                </div>`;
            m.classList.add('show');
            
            if (window.google) {
                google.accounts.id.initialize({
                    client_id: "157699985261-179mbdt1jlpv4qm85vtkrmkg37mdiie3.apps.googleusercontent.com",
                    callback: handleCredentialResponse
                });
                google.accounts.id.renderButton(
                    document.querySelector(".g_id_signin"),
                    { theme: "filled_blue", size: "large" }
                );
            }
        }

        async function handleCredentialResponse(response) {
            const res = await api('/auth/google', 'POST', { token: response.credential });
            if (res.success) {
                app.user = res.user;
                localStorage.setItem('user', JSON.stringify(app.user));
                applyTheme(app.user.settings?.theme || 'dark');
                document.getElementById('setupModal').classList.remove('show');
                renderMain(); 
                sync();
            } else {
                alert('Authentication failed: ' + (res.error || 'Unknown error'));
            }
        }

        function renderMain() {
            const userAvatar = app.user.avatar || 'https://via.placeholder.com/150';
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="sidebar">
                        <div class="sidebar-header">
                            <div class="header-top">
                                <h2>Chats</h2>
                                <button class="settings-btn" onclick="showSettingsModal()">⚙️ Settings</button>
                            </div>
                            <div class="user-info">
                                <div class="user-info-left">
                                    <img src="${userAvatar}" alt="Avatar">
                                    <span>Logged in as: <strong>${app.user.name}</strong></span>
                                </div>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button onclick="showRoomModal('create')">New Room</button>
                            <button class="secondary" onclick="showRoomModal('join')">Join with ID</button>
                        </div>
                        <div class="rooms-list" id="roomsList"></div>
                    </div>
                    <div class="main" id="mainArea">
                        <div class="empty-state">
                            <h3>ChatApp Web</h3>
                            <p>Select an existing chat room configuration from the sidebar loop or spin up a new private channel to start broadcast messaging.</p>
                        </div>
                    </div>
                </div>`;
            updateRooms();
        }
