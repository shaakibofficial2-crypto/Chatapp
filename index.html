<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp - Modern Room Chat</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        :root {
            --bg-main: #0b141a;
            --bg-sidebar: #111b21;
            --bg-header: #202c33;
            --bg-card: #111b21;
            --border-color: #222e35;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --accent-green: #00a884;
            --bubble-sent: #005c4b;
            --bubble-received: #202c33;
            --input-bg: #2a3942;
            --btn-hover: #182229;
            --wa-bg-dark: #0b141a;
        }

        body.light-mode {
            --bg-main: #efeae2;
            --bg-sidebar: #ffffff;
            --bg-header: #f0f2f5;
            --bg-card: #ffffff;
            --border-color: #e9edef;
            --text-primary: #111b21;
            --text-secondary: #667781;
            --accent-green: #008069;
            --bubble-sent: #d9fdd3;
            --bubble-received: #ffffff;
            --input-bg: #ffffff;
            --btn-hover: #f0f2f5;
            --wa-bg-dark: #f0f2f5;
        }

        body { 
            background: var(--bg-main);
            color: var(--text-primary); 
            overflow: hidden; 
            transition: background 0.3s;
            height: 100vh;
            width: 100vw;
        }

        .container { display: flex; height: 100vh; width: 100vw; position: relative; }
        
        /* Sidebar Layout styling */
        .sidebar { 
            width: 400px; 
            border-right: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            background: var(--bg-sidebar); 
            height: 100%; 
            z-index: 10;
        }
        
        .sidebar-header { 
            padding: 12px 16px; 
            background: var(--bg-header); 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-top h2 { font-size: 20px; font-weight: 700; color: var(--text-primary); }

        .user-info { 
            font-size: 13px; 
            color: var(--text-secondary); 
            padding: 8px 12px; 
            background: var(--bg-main); 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }

        .user-info img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .settings-btn { 
            background: none; 
            border: none; 
            color: var(--accent-green); 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 600; 
        }
        
        .action-buttons { 
            padding: 10px 16px; 
            display: flex; 
            gap: 10px; 
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
        }
        
        .action-buttons button, .modal-buttons button { 
            flex: 1; 
            padding: 10px; 
            background: var(--accent-green); 
            color: white; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 14px;
        }

        /* Rooms Stream */
        .rooms-list { flex: 1; overflow-y: auto; background: var(--bg-sidebar); }
        .room-item { 
            padding: 15px 20px; 
            border-bottom: 1px solid var(--border-color); 
            cursor: pointer; 
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .room-item:hover { background: var(--bg-header); }
        .room-item.active { background: var(--bg-header); border-left: 4px solid var(--accent-green); }

        /* Main Workspace Window */
        .main { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); height: 100%; z-index: 5; }
        
        .chat-header { 
            padding: 14px 20px; 
            background: var(--bg-header); 
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            height: 60px;
        }

        .messages-area { flex: 1; overflow-y: auto; padding: 24px 30px; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; width: 100%; }
        .message.sent { justify-content: flex-end; }
        .message.received { justify-content: flex-start; }
        .message-content { max-width: 65%; display: flex; flex-direction: column; }
        .message-bubble { padding: 8px 14px; border-radius: 8px; font-size: 14.5px; line-height: 1.4; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); word-break: break-word; }
        .message.sent .message-bubble { background: var(--bubble-sent); color: var(--text-primary); border-top-right-radius: 0; }
        .message.received .message-bubble { background: var(--bubble-received); color: var(--text-primary); border-top-left-radius: 0; }
        .message-user { font-size: 12px; color: #53bdeb; margin-bottom: 3px; font-weight: 600; }

        .input-section { padding: 10px 24px; background: var(--bg-header); display: flex; align-items: center; gap: 12px; height: 62px; }
        .input-section input { flex: 1; padding: 12px 20px; border-radius: 8px; border: none; background: var(--input-bg); color: var(--text-primary); outline: none; }
        .input-section button { padding: 12px 24px; background: var(--accent-green); color: white; border: none; border-radius: 8px; cursor: pointer; }

        /* Center Setup Pop-up Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11,20,26,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal.show { display: flex; }
        .modal-content { background: var(--bg-header); padding: 30px; border-radius: 16px; width: 90%; max-width: 420px; border: 1px solid var(--border-color); }
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-primary); outline: none; }

        /* Side Sliding Drawer Configuration for Settings Panel */
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 2000; backdrop-filter: blur(2px); justify-content: flex-end; }
        .drawer-overlay.show { display: flex; }
        
        .settings-drawer {
            background-color: var(--wa-bg-dark);
            color: var(--text-primary);
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: -8px 0 32px rgba(0,0,0,0.5);
        }

        .settings-header { display: flex; align-items: center; padding: 16px; background-color: var(--bg-header); gap: 20px; border-bottom: 1px solid var(--border-color); }
        .back-btn { background: none; border: none; color: var(--text-primary); cursor: pointer; display: flex; align-items: center; }
        .profile-hero-card { display: flex; align-items: center; padding: 20px 16px; background-color: var(--wa-bg-dark); }
        .avatar-wrapper { position: relative; margin-right: 15px; }
        .avatar-wrapper img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-color); }
        .camera-badge { position: absolute; bottom: 0; right: 0; background-color: var(--accent-green); padding: 5px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .profile-hero-info h3 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
        .profile-hero-info p { color: var(--text-secondary); font-size: 14px; }
        
        .settings-options-list { flex: 1; overflow-y: auto; }
        .settings-row { display: flex; align-items: center; padding: 16px 24px; cursor: pointer; gap: 25px; }
        .settings-row:hover { background-color: var(--bg-header); }
        .row-icon svg { fill: var(--text-secondary); }
        .settings-row:hover .row-icon svg { fill: var(--accent-green); }
        .row-text h4 { font-size: 16px; font-weight: 400; margin-bottom: 2px; }
        .row-text p { color: var(--text-secondary); font-size: 13px; }

        .theme-select-wrapper { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; background: var(--bg-header); margin: 10px 0; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
        .theme-select-wrapper select { padding: 6px 12px; border-radius: 6px; background: var(--input-bg); color: var(--text-primary); border: 1px solid var(--border-color); outline: none; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); gap: 12px; text-align: center; }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="setupModal" class="modal"></div>
    <div id="roomModal" class="modal"></div>
    
    <div id="drawerOverlay" class="drawer-overlay" onclick="closeSettingsModal(event)"></div>
    
    <script>
        const API = window.location.origin + '/api';
        window.app = { user: null, currentRoom: null, rooms: [] };
        
        async function api(endpoint, method = 'GET', body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            return (await fetch(API + endpoint, opts)).json();
        }

        function init() {
            const saved = localStorage.getItem('user');
            if (saved) { 
                app.user = JSON.parse(saved); 
                applyTheme(app.user.settings?.theme || 'dark');
                renderMain(); 
                sync(); 
            } 
            else renderSetup();
        }

        function renderSetup() {
            const m = document.getElementById('setupModal');
            m.innerHTML = `
                <div class="modal-content" style="text-align: center;">
                    <h2 style="margin-bottom: 10px;">Welcome to ChatApp</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 25px; font-size: 14px;">
                        Sign in with Google to enter your rooms and message profiles securely.
                    </p>
                    <div style="display: flex; justify-content: center;">
                        <div id="g_id_onload"
                             data-client_id="157699985261-179mbdt1jlpv4qm85vtkrmkg37mdiie3.apps.googleusercontent.com"
                             data-callback="handleCredentialResponse"
                             data-auto_prompt="false">
                        </div>
                        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_blue"></div>
                    </div>
                </div>`;
            m.classList.add('show');
            
            if (window.google) {
                google.accounts.id.initialize({
                    client_id: "157699985261-179mbdt1jlpv4qm85vtkrmkg37mdiie3.apps.googleusercontent.com",
                    callback: handleCredentialResponse
                });
                google.accounts.id.renderButton(document.querySelector(".g_id_signin"), { theme: "filled_blue", size: "large" });
            }
        }

        async function handleCredentialResponse(response) {
            const res = await api('/auth/google', 'POST', { token: response.credential });
            if (res.success) {
                app.user = res.user;
                localStorage.setItem('user', JSON.stringify(app.user));
                applyTheme(app.user.settings?.theme || 'dark');
                document.getElementById('setupModal').classList.remove('show');
                renderMain(); 
                sync();
            } else {
                alert('Authentication failed.');
            }
        }

        function renderMain() {
            const userAvatar = app.user.avatar || 'https://via.placeholder.com/150';
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="sidebar">
                        <div class="sidebar-header">
                            <div class="header-top">
                                <h2>Chats</h2>
                                <button class="settings-btn" onclick="showSettingsModal()">⚙️ Settings</button>
                            </div>
                            <div class="user-info">
                                <img src="${userAvatar}" alt="Avatar">
                                <span>Logged in as: <strong>${app.user.name}</strong></span>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button onclick="showRoomModal('create')">New Room</button>
                            <button class="secondary" onclick="showRoomModal('join')">Join with ID</button>
                        </div>
                        <div class="rooms-list" id="roomsList"></div>
                    </div>
                    <div class="main" id="mainArea">
                        <div class="empty-state">
                            <h3>ChatApp Web</h3>
                            <p>Select a conversation stream from the sidebar workspace framework to view log entries.</p>
                        </div>
                    </div>
                </div>`;
            updateRooms();
        }

        function showSettingsModal() {
            const overlay = document.getElementById('drawerOverlay');
            const currentSettings = app.user.settings || { theme: 'dark' };
            const userAvatar = app.user.avatar || 'https://via.placeholder.com/150';
            
            overlay.innerHTML = `
                <div class="settings-drawer" onclick="event.stopPropagation()">
                    <div class="settings-header">
                        <button onclick="closeSettingsModal(event)" class="back-btn">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                        </button>
                        <h2 style="font-size: 19px; font-weight: 500;">Settings</h2>
                    </div>
                    <div class="profile-hero-card">
                        <div class="avatar-wrapper">
                            <img src="${userAvatar}" alt="Avatar">
                            <div class="camera-badge"><svg viewBox="0 0 24 24" width="12" height="12" fill="#fff"><path d="M12 12m-3.2 0a3.2 3.2 0 1 0 6.4 0a3.2 3.2 0 1 0 -6.4 0M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5s5 2.24 5 5s-2.24 5-5 5z"/></svg></div>
                        </div>
                        <div class="profile-hero-info">
                            <h3>${app.user.name}</h3>
                            <p>${app.user.email}</p>
                        </div>
                    </div>
                    <div class="theme-select-wrapper">
                        <span>App Theme Interface</span>
                        <select id="settingTheme" onchange="saveSettings()">
                            <option value="dark" ${currentSettings.theme === 'dark' ? 'selected' : ''}>Dark</option>
                            <option value="light" ${currentSettings.theme === 'light' ? 'selected' : ''}>Light</option>
                        </select>
                    </div>
                    <div class="settings-options-list">
                        <div class="settings-row"><div class="row-icon"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v3h3v-3h3v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg></div><div class="row-text"><h4>Account</h4><p>Security keys and recovery indicators</p></div></div>
                        <div class="settings-row"><div class="row-icon"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-1-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg></div><div class="row-text"><h4>Privacy</h4><p>Profile metrics block listings</p></div></div>
                    </div>
                </div>`;
            overlay.classList.add('show');
        }

        function closeSettingsModal(e) {
            document.getElementById('drawerOverlay').classList.remove('show');
        }

        async function saveSettings() {
            const selectedTheme = document.getElementById('settingTheme').value;
            const res = await api('/update-settings', 'POST', { email: app.user.email, settings: { theme: selectedTheme } });
            if (res.success) {
                app.user.settings = res.settings;
                localStorage.setItem('user', JSON.stringify(app.user));
                applyTheme(res.settings.theme);
                renderMain();
                showSettingsModal();
            }
        }

        function applyTheme(theme) {
            if (theme === 'light') document.body.classList.add('light-mode');
            else document.body.classList.remove('light-mode');
        }

        async function updateRooms() {
            const res = await api('/rooms/' + app.user.email);
            app.rooms = res.rooms || [];
            const listEl = document.getElementById('roomsList');
            if (listEl) {
                listEl.innerHTML = app.rooms.map(r => `
                    <div class="room-item ${app.currentRoom?._id === r._id ? 'active' : ''}" onclick="selectRoom('${r._id}')">
                        <strong>💬 ${r.roomName}</strong>
                        <small>${r.members.length} participants</small>
                    </div>
                `).join('');
            }
        }

        async function selectRoom(id) {
            app.currentRoom = app.rooms.find(r => r._id === id);
            document.getElementById('mainArea').innerHTML = `
                <div class="chat-header"><h3>${app.currentRoom.roomName}</h3></div>
                <div class="messages-area" id="msgs"></div>
                <div class="input-section">
                    <input type="text" id="msgInput" placeholder="Type a message">
                    <button onclick="sendMsg()">Send</button>
                </div>`;
            
            document.getElementById('msgInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMsg(); });
            updateMsgs();
        }

        async function updateMsgs() {
            if (!app.currentRoom) return;
            const res = await api('/messages/' + app.currentRoom._id);
            const msgs = res.messages || [];
            const box = document.getElementById('msgs');
            if (!box) return;
            box.innerHTML = msgs.map(m => {
                const isMe = m.sender === app.user.email;
                return `<div class="message ${isMe ? 'sent' : 'received'}">
                    <div class="message-content">
                        ${!isMe ? `<div class="message-user">${m.senderName}</div>` : ''}
                        <div class="message-bubble">${m.text}</div>
                    </div>
                </div>`;
            }).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            if (!input || !input.value.trim()) return;
            await api('/send-message', 'POST', { roomId: app.currentRoom._id, sender: app.user.email, senderName: app.user.name, text: input.value });
            input.value = ''; updateMsgs();
        }

        function showRoomModal(type) {
            const m = document.getElementById('roomModal');
            const isCreate = type === 'create';
            m.innerHTML = `
                <div class="modal-content">
                    <h2>${isCreate ? 'Create New Room' : 'Join Existing Room'}</h2>
                    <input type="text" id="roomInput" placeholder="${isCreate ? 'Enter Room Name' : 'Paste Room ID'}">
                    <div class="modal-buttons">
                        <button onclick="${isCreate ? 'createRoom()' : 'joinRoom()'}">${isCreate ? 'Create' : 'Join'}</button>
                        <button class="secondary" onclick="document.getElementById('roomModal').classList.remove('show')">Cancel</button>
                    </div>
                </div>`;
            m.classList.add('show');
        }

        async function createRoom() {
            const name = document.getElementById('roomInput').value;
            if(!name.trim()) return;
            const res = await api('/create-room', 'POST', { creator: app.user.email, roomName: name });
            alert('Room ID: ' + res.roomId);
            document.getElementById('roomModal').classList.remove('show');
            updateRooms();
        }

        async function joinRoom() {
            const id = document.getElementById('roomInput').value;
            if(!id.trim()) return;
            await api('/join-room', 'POST', { email: app.user.email, roomId: id });
            document.getElementById('roomModal').classList.remove('show');
            updateRooms();
        }

        function sync() { setInterval(() => { app.currentRoom ? updateMsgs() : updateRooms(); }, 2000); }
        window.onload = function() { init(); };
    </script>
</body>
</html>
